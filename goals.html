<!DOCTYPE html>
<html lang=us>
<head>
  <meta charset="UTF=8">
  <title>Goals</title>
  <a rel="stylesheet"><herf="styles.css">
</head>
<body>
<main>
  <header>
    <h1 id="name">Cody Pickering</h1>
    <li>
      <a href=rivetenn.github.io/Resume>Resume</a>
      <a href=rivetenn.github.io/index>Cover Letter</a>
    </li>
  </header>
<h2>Contact Me<h2>
  <hr>
<form action="https://wp.zybooks.com/form-viewer.php" method="POST">
  <p>
    <label for="first">First Name</label>
    <input type="text" id="first" name="first">
    <label for="last">Last Name</label>
    <input type="text" id="last" name="last"><br>  
  </p>
  <label for="CN">Company Name</label><br>
  <input type="text" id="CN" name="CN"><br><br>
  <label for="mail">Email</label><br>
  <input type="email" id="mail" name="mail" placeholder="example@gmail.com"><br><br>
  <label for="pn">Phone Number</label><br>
  <input type="phone" id="pn" name="pn" placeholder="1234567890"><br><br>
  
  <label for="message">Message</label><br>
  <textarea rows="20" cols="20" id="message" name="message">Place your message here...</textarea><br>
  
  <p>Preferred Contact Hours</p>
  <p>
    <label for="AM">A.M.</label>
    <input type="radio" id="AM" name="ContactHours" value="AM">
    <label for="PM">P.M.</label>
    <input type="radio" id="PM" name="ContactHours" value="PM">
    <label for="AY">Anytime</label>
    <input type="radio" id="AY" name="ContactHours" value="Anytime">  
  </p>
  <p>
  <p>Prefered Contact Method?</p>
    <label for="phonec">Phone</label>
    <input type="radio" id="phonec" name="ContactMethod" value="Phone">
    <label for="emailc">Email</label>
    <input type="radio" id="emailc" name="ContactMethod" value="Email">
    <label for="textc">Text</label>
    <input type="radio" id="textc" name="ContactMethod" value="Text">     
  </p>
  <input type="submit" value="Submit">
</form>
  
</main>
<footer>
  
</footer>
</body>
</html>
